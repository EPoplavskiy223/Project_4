{% extends 'client/home.html' %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card shadow-sm">
                <div class="card-header bg-primary bg-opacity-10 border-bottom border-secondary border-opacity-25">
                    <h3 class="mb-0">Удалить клиента?</h3>
                </div>
                <div class="card-body">
                    <p class="lead mb-0">Вы уверены, что хотите удалить клиента:</p>
                    <p class="fw-bold mt-2 mb-0">"{{ client.name }}"</p>
                    <p class="text-muted mt-1 mb-0">{{ client.email }}</p>
                </div>
                <div class="card-footer bg-transparent border-top border-secondary border-opacity-25">
                    <form method="post" class="d-flex justify-content-end gap-2">
                        {% csrf_token %}
                        <a href="{% url 'clients:client_list' %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
